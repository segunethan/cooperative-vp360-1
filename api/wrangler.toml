name = "jollify-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# Secrets (set via: wrangler secret put SECRET_NAME)
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET

[env.staging]
name = "jollify-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[[routes]]
pattern = "api.jollify.app/*"
zone_name = "jollify.app"
